name: Prepare README pilot selector reconciliation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  prepare:
    if: github.actor == 'armpitpete'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: fix/live-pilot-selector-drift

      - name: Apply bounded authority reconciliation
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          config_path = Path("config/readme-sync-pilots.json")
          config = json.loads(config_path.read_text(encoding="utf-8"))
          target = next(item for item in config["targets"] if item["id"] == "pilot-02")
          old_authority = "20_Language/LANGUAGE_ARCHITECTURE.md"
          new_authority = "20_Language/D-08_IMPLEMENTATION_SUPERSESSION_RECORD.md"
          if target["authority"] != old_authority:
              raise SystemExit(f"unexpected pilot-02 authority: {target['authority']}")
          target["authority"] = new_authority
          config_path.write_text(json.dumps(config, indent=2) + "\n", encoding="utf-8")

          workflow_path = Path(".github/workflows/status.yml")
          workflow = workflow_path.read_text(encoding="utf-8")
          old_percentage = '"core_grammar_decisions": 70.0,'
          new_percentage = '"core_grammar_decisions": 80.0,'
          if workflow.count(old_percentage) != 1:
              raise SystemExit("expected exactly one stale pilot-02 percentage")
          workflow_path.write_text(
              workflow.replace(old_percentage, new_percentage, 1),
              encoding="utf-8",
          )
          PY

      - name: Verify bounded diff
        run: |
          git diff --check
          git diff --exit-code -- . ':!config/readme-sync-pilots.json' ':!.github/workflows/status.yml' ':!.github/workflows/diagnose-readme-pilot-selectors.yml'
          git diff -- config/readme-sync-pilots.json .github/workflows/status.yml

      - name: Stage repaired files for connector application
        run: |
          mkdir -p reconciliation/config reconciliation/.github/workflows
          cp config/readme-sync-pilots.json reconciliation/config/readme-sync-pilots.json
          cp .github/workflows/status.yml reconciliation/.github/workflows/status.yml

      - name: Upload verified reconciliation
        uses: actions/upload-artifact@v4
        with:
          name: verified-pilot-reconciliation
          path: reconciliation
          if-no-files-found: error
          retention-days: 1
