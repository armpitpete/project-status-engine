name: Diagnose README pilot selectors

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate current internal completion data
        env:
          PROJECT_STATUS_TOKEN: ${{ secrets.PROJECT_STATUS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STATUS_OWNER: armpitpete
          STATUS_MAX_REPOS: "100"
          STATUS_MAX_ITEMS: "8"
          STATUS_PROJECT_LIMIT: "5"
          STATUS_ACTIVITY_WINDOW_DAYS: "30"
          STATUS_PROGRESS_PATH: .project/progress.json
          STATUS_OUT_DIR: public
          PRIVATE_STATUS_OUT_DIR: private-build
          INTERNAL_STATUS_OUT_DIR: internal-build
        run: python scripts/generate_status.py

      - name: Report anonymous selector match counts
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import sys

          sys.path.insert(0, "scripts")
          import resolve_readme_pilots as resolver

          selectors = resolver.load_selectors(Path("config/readme-sync-pilots.json"))
          candidates = resolver._load_candidates(Path("internal-build/completion-status.json"))

          for selector in selectors:
              matches = [
                  candidate
                  for candidate in candidates
                  if candidate["private"] is selector["private"]
                  and candidate["project_type"] == selector["project_type"]
                  and candidate["authority"] == selector["authority"]
                  and candidate["stage_ids"] == selector["stage_ids"]
              ]
              print(
                  json.dumps(
                      {
                          "selector_id": selector["id"],
                          "match_count": len(matches),
                      },
                      separators=(",", ":"),
                  )
              )
          PY
