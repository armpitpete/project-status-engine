name: Daily README synchroniser

on:
  workflow_dispatch:
    inputs:
      apply:
        description: Apply validated README updates
        required: true
        type: boolean
        default: true
  schedule:
    - cron: "17 5 * * *"
      timezone: "Europe/London"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/readme-sync.yml"
      - "config/readme-sync-policy.json"
      - "tests/fixtures/readme-sync-contract-shapes.json"
      - "scripts/readme_sync.py"
      - "scripts/readme_sync_runner.py"
      - "scripts/resolve_readme_pilots.py"
      - "tests/test_readme_sync.py"
      - "tests/test_readme_sync_runner.py"
      - "tests/test_resolve_readme_pilots.py"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/readme-sync.yml"
      - "config/readme-sync-policy.json"
      - "tests/fixtures/readme-sync-contract-shapes.json"
      - "scripts/readme_sync.py"
      - "scripts/readme_sync_runner.py"
      - "scripts/resolve_readme_pilots.py"
      - "tests/test_readme_sync.py"
      - "tests/test_readme_sync_runner.py"
      - "tests/test_resolve_readme_pilots.py"

permissions:
  contents: read

concurrency:
  group: daily-readme-synchroniser
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Run deterministic tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Prove committed rollout configuration contains no repository identity
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          policy_path = Path("config/readme-sync-policy.json")
          policy = json.loads(policy_path.read_text(encoding="utf-8"))
          assert policy == {"schema_version": 1, "mode": "all-valid"}

          fixture_path = Path("tests/fixtures/readme-sync-contract-shapes.json")
          fixture = json.loads(fixture_path.read_text(encoding="utf-8"))
          assert fixture["schema_version"] == 1
          assert len(fixture["targets"]) == 3

          text = policy_path.read_text(encoding="utf-8") + fixture_path.read_text(
              encoding="utf-8"
          )
          assert "github.com" not in text
          assert "armpitpete/" not in text
          print("Verified identity-free all-valid policy and test-only contract fixtures.")
          PY

  synchronise:
    needs: validate
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.apply)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Generate trusted internal completion dataset
        env:
          PROJECT_STATUS_TOKEN: ${{ secrets.PROJECT_STATUS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STATUS_OWNER: armpitpete
          STATUS_MAX_REPOS: "100"
          STATUS_MAX_ITEMS: "8"
          STATUS_PROJECT_LIMIT: "5"
          STATUS_ACTIVITY_WINDOW_DAYS: "30"
          STATUS_API_RETRIES: "2"
          STATUS_PROGRESS_PATH: .project/progress.json
          STATUS_OUT_DIR: public
          PRIVATE_STATUS_OUT_DIR: private-build
          INTERNAL_STATUS_OUT_DIR: internal-build
        run: python scripts/generate_status.py

      - name: Resolve every valid project inside the trusted runner
        run: >-
          python scripts/resolve_readme_pilots.py
          --dataset internal-build/completion-status.json
          --policy config/readme-sync-policy.json
          --output internal-build/readme-sync-targets.json

      - name: Synchronise validated README sections
        env:
          README_SYNC_TOKEN: ${{ secrets.README_SYNC_TOKEN || secrets.PROJECT_STATUS_TOKEN }}
        run: >-
          python scripts/readme_sync_runner.py
          --dataset internal-build/completion-status.json
          --allowlist internal-build/readme-sync-targets.json
          --apply

      - name: Confirm trusted data remains outside public output
        run: |
          test -f internal-build/completion-status.json
          test -f internal-build/readme-sync-targets.json
          test ! -e public/internal-build
          test ! -e public/completion-status.json
          test ! -e public/readme-sync-targets.json
