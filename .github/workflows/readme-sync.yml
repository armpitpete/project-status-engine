name: Daily README synchroniser

on:
  workflow_dispatch:
    inputs:
      apply:
        description: Apply pilot README updates
        required: true
        type: boolean
        default: true
  schedule:
    - cron: "17 5 * * *"
      timezone: "Europe/London"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/readme-sync.yml"
      - "config/readme-sync-pilots.json"
      - "scripts/readme_sync.py"
      - "scripts/resolve_readme_pilots.py"
      - "tests/test_readme_sync.py"
      - "tests/test_resolve_readme_pilots.py"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/readme-sync.yml"
      - "config/readme-sync-pilots.json"
      - "scripts/readme_sync.py"
      - "scripts/resolve_readme_pilots.py"
      - "tests/test_readme_sync.py"
      - "tests/test_resolve_readme_pilots.py"

permissions:
  contents: read

concurrency:
  group: daily-readme-synchroniser
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run deterministic tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Prove committed pilot configuration contains no repository identity
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("config/readme-sync-pilots.json")
          document = json.loads(path.read_text(encoding="utf-8"))
          assert document["schema_version"] == 1
          assert len(document["targets"]) == 3
          text = path.read_text(encoding="utf-8")
          assert "github.com" not in text
          assert "armpitpete/" not in text
          print("Verified identity-free three-pilot configuration.")
          PY

  synchronise:
    needs: validate
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.apply)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate trusted internal completion dataset
        env:
          PROJECT_STATUS_TOKEN: ${{ secrets.PROJECT_STATUS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STATUS_OWNER: armpitpete
          STATUS_MAX_REPOS: "100"
          STATUS_MAX_ITEMS: "8"
          STATUS_PROJECT_LIMIT: "5"
          STATUS_ACTIVITY_WINDOW_DAYS: "30"
          STATUS_PROGRESS_PATH: .project/progress.json
          STATUS_OUT_DIR: public
          PRIVATE_STATUS_OUT_DIR: private-build
          INTERNAL_STATUS_OUT_DIR: internal-build
        run: python scripts/generate_status.py

      - name: Resolve three pilots inside the trusted runner
        run: >-
          python scripts/resolve_readme_pilots.py
          --dataset internal-build/completion-status.json
          --selectors config/readme-sync-pilots.json
          --output internal-build/readme-sync-targets.json

      - name: Synchronise pilot README sections
        env:
          README_SYNC_TOKEN: ${{ secrets.README_SYNC_TOKEN || secrets.PROJECT_STATUS_TOKEN }}
        run: >-
          python scripts/readme_sync.py
          --dataset internal-build/completion-status.json
          --allowlist internal-build/readme-sync-targets.json
          --apply

      - name: Confirm trusted data remains outside public output
        run: |
          test -f internal-build/completion-status.json
          test -f internal-build/readme-sync-targets.json
          test ! -e public/internal-build
          test ! -e public/completion-status.json
          test ! -e public/readme-sync-targets.json
