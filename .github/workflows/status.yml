name: Generate project status

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  PAGES_ARTIFACT_NAME: status-pages-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run deterministic tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Generate status views
        env:
          PROJECT_STATUS_TOKEN: ${{ secrets.PROJECT_STATUS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STATUS_OWNER: armpitpete
          STATUS_MAX_REPOS: "100"
          STATUS_MAX_ITEMS: "8"
          STATUS_PROJECT_LIMIT: "5"
          STATUS_ACTIVITY_WINDOW_DAYS: "30"
          STATUS_PROGRESS_PATH: .project/progress.json
          STATUS_OUT_DIR: public
          PRIVATE_STATUS_OUT_DIR: private-build
          INTERNAL_STATUS_OUT_DIR: internal-build
        run: python scripts/generate_status.py

      - name: Validate output separation and pilot completion data
        run: |
          test -f public/index.html
          test -f public/status.json
          test -f public/completion-status.md
          test -f private-build/index.html
          test -f private-build/status.json
          test -f private-build/completion-status.md
          test -f private-build/authority-exceptions.md
          test -f private-build/authority-resolution-templates.md
          test -f internal-build/completion-status.json
          test ! -e public/private-build
          test ! -e public/private
          test ! -e public/internal-build
          test ! -e public/completion-status.json
          test ! -e public/authority-exceptions.md
          test ! -e public/authority-resolution-templates.md
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path
          import sys

          sys.path.insert(0, "scripts")
          import resolve_readme_pilots as resolver

          internal_path = Path("internal-build/completion-status.json")
          private_path = Path("private-build/status.json")
          public_path = Path("public/status.json")
          selector_path = Path("config/readme-sync-pilots.json")
          internal = json.loads(internal_path.read_text(encoding="utf-8"))
          private = json.loads(private_path.read_text(encoding="utf-8"))
          public = json.loads(public_path.read_text(encoding="utf-8"))
          selectors = resolver.load_selectors(selector_path)
          resolved = resolver.resolve(internal_path, selector_path)

          repositories = {
              hashlib.sha256(item["full_name"].encode("utf-8")).hexdigest(): item
              for item in internal["repositories"]
          }
          pilot_hashes = {
              selector["id"]: target_hash
              for selector, target_hash in zip(
                  selectors,
                  resolved["target_hashes"],
                  strict=True,
              )
          }
          expected = {
              "pilot-01": {
                  "private": True,
                  "stages": {
                      "editorially_complete_manuscript": 100.0,
                      "publication_assembly": 0.0,
                      "docx_preflight": 0.0,
                      "pdf_preflight": 0.0,
                  },
              },
              "pilot-02": {
                  "private": True,
                  "stages": {
                      "core_grammar_decisions": 70.0,
                  },
              },
              "pilot-03": {
                  "private": False,
                  "stages": {
                      "activity_dashboard": 100.0,
                      "completion_authority_engine": 100.0,
                      "private_authenticated_delivery": 0.0,
                      "daily_readme_synchroniser": 100.0,
                  },
              },
          }

          assert set(pilot_hashes) == set(expected)
          for pilot_id, expectation in expected.items():
              record = repositories[pilot_hashes[pilot_id]]
              completion = record["completion"]
              assert completion["state"] == "valid"
              actual_stages = {
                  stage["id"]: stage["percentage"]
                  for stage in completion["stages"]
              }
              assert actual_stages == expectation["stages"]
              assert completion["overall_percentage"] is None
              assert record["private"] is expectation["private"]

          expected_queue = sorted(
              item["full_name"]
              for item in internal["repositories"]
              if item.get("authority_exception")
          )
          internal_queue = sorted(
              item["full_name"] for item in internal["authority_exception_queue"]
          )
          private_queue = sorted(
              item["full_name"] for item in private["authority_exception_queue"]
          )
          assert internal_queue == expected_queue, (
              len(internal_queue), len(expected_queue)
          )
          assert private_queue == expected_queue, (
              len(private_queue), len(expected_queue)
          )
          assert internal["authority_exception_summary"]["total"] == len(expected_queue)
          assert private["authority_exception_summary"]["total"] == len(expected_queue)
          for item in internal["authority_exception_queue"]:
              assert item["resolution_lane"]
              assert item["required_action"]
              assert isinstance(item["owner_decision_required"], bool)
          assert internal["authority_exception_summary"] == private["authority_exception_summary"]

          assert "authority_exception_queue" not in public
          assert "authority_exception_summary" not in public
          assert all("authority_exception" not in item for item in public["projects"])

          public_text = "\n".join(
              path.read_text(encoding="utf-8")
              for path in Path("public").rglob("*")
              if path.is_file()
          )
          for pilot_id, expectation in expected.items():
              if not expectation["private"]:
                  continue
              record = repositories[pilot_hashes[pilot_id]]
              completion = record["completion"]
              forbidden = [
                  record["full_name"],
                  record.get("url") or "",
                  completion["authority"],
              ]
              for stage in completion["stages"]:
                  forbidden.append(stage["label"])
                  if stage.get("evidence"):
                      forbidden.append(stage["evidence"])
              for value in forbidden:
                  if value:
                      assert value not in public_text

          for record in internal["repositories"]:
              exception = record.get("authority_exception")
              if not exception or not record["private"]:
                  continue
              for value in (
                  record["full_name"],
                  record.get("url") or "",
                  exception.get("detail") or "",
                  exception.get("source_sha") or "",
              ):
                  if value:
                      assert value not in public_text

          print(
              "Verified three contract-selected pilots, owner-wide private exception queue, "
              "resolution lanes, and structural public output separation."
          )
          PY

      - name: Prepare dedicated private deployment credential
        if: github.event_name != 'pull_request' && vars.PRIVATE_STATUS_DEPLOY_ENABLED == 'true'
        env:
          PRIVATE_STATUS_DEPLOY_KEY: ${{ secrets.PRIVATE_STATUS_DEPLOY_KEY }}
          PRIVATE_STATUS_KNOWN_HOSTS: ${{ secrets.PRIVATE_STATUS_KNOWN_HOSTS }}
        run: |
          test -n "$PRIVATE_STATUS_DEPLOY_KEY"
          test -n "$PRIVATE_STATUS_KNOWN_HOSTS"
          install -d -m 700 "${RUNNER_TEMP}/private-status-ssh"
          printf '%s\n' "$PRIVATE_STATUS_DEPLOY_KEY" > "${RUNNER_TEMP}/private-status-ssh/id_ed25519"
          printf '%s\n' "$PRIVATE_STATUS_KNOWN_HOSTS" > "${RUNNER_TEMP}/private-status-ssh/known_hosts"
          chmod 600 "${RUNNER_TEMP}/private-status-ssh/id_ed25519" "${RUNNER_TEMP}/private-status-ssh/known_hosts"

      - name: Deploy private owner dashboard to pinned Oracle target
        if: github.event_name != 'pull_request' && vars.PRIVATE_STATUS_DEPLOY_ENABLED == 'true'
        env:
          PRIVATE_STATUS_DEPLOY_HOST: server.vaelinya.uk
          PRIVATE_STATUS_DEPLOY_USER: vaelinya
          PRIVATE_STATUS_DEPLOY_TARGET: /home/vaelinya/public_html/private/project-status-engine/
          PRIVATE_STATUS_SOURCE_DIR: private-build
          PRIVATE_STATUS_SSH_KEY_FILE: ${{ runner.temp }}/private-status-ssh/id_ed25519
          PRIVATE_STATUS_KNOWN_HOSTS_FILE: ${{ runner.temp }}/private-status-ssh/known_hosts
        run: bash scripts/deploy_private_status.sh

      - name: Verify anonymous access remains blocked
        if: github.event_name != 'pull_request' && vars.PRIVATE_STATUS_DEPLOY_ENABLED == 'true'
        run: python scripts/verify_private_access.py https://command.vaelinya.uk/private/project-status-engine/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload public Pages artifact only
        uses: actions/upload-pages-artifact@v3
        with:
          name: ${{ env.PAGES_ARTIFACT_NAME }}
          path: public

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy public surface to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: ${{ env.PAGES_ARTIFACT_NAME }}
