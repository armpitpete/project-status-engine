name: Generate project status

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  PAGES_ARTIFACT_NAME: status-pages-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run deterministic tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Generate status views
        env:
          PROJECT_STATUS_TOKEN: ${{ secrets.PROJECT_STATUS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STATUS_OWNER: armpitpete
          STATUS_MAX_REPOS: "100"
          STATUS_MAX_ITEMS: "8"
          STATUS_PROJECT_LIMIT: "5"
          STATUS_ACTIVITY_WINDOW_DAYS: "30"
          STATUS_PROGRESS_PATH: .project/progress.json
          STATUS_OUT_DIR: public
          PRIVATE_STATUS_OUT_DIR: private-build
          INTERNAL_STATUS_OUT_DIR: internal-build
        run: python scripts/generate_status.py

      - name: Validate output separation and pilot completion data
        run: |
          test -f public/index.html
          test -f public/status.json
          test -f public/completion-status.md
          test -f private-build/index.html
          test -f private-build/status.json
          test -f private-build/completion-status.md
          test -f internal-build/completion-status.json
          test ! -e public/private-build
          test ! -e public/private
          test ! -e public/internal-build
          test ! -e public/completion-status.json
          python - <<'PY'
          import json
          from pathlib import Path

          internal_path = Path("internal-build/completion-status.json")
          internal = json.loads(internal_path.read_text(encoding="utf-8"))
          repositories = {item["full_name"]: item for item in internal["repositories"]}

          expected = {
              "armpitpete/unmurderous-objects": {
                  "editorially_complete_manuscript": 100.0,
                  "publication_assembly": 0.0,
                  "docx_preflight": 0.0,
                  "pdf_preflight": 0.0,
              },
              "armpitpete/vaelinya-canon": {
                  "core_grammar_decisions": 70.0,
              },
              "armpitpete/project-status-engine": {
                  "activity_dashboard": 100.0,
                  "completion_authority_engine": 100.0,
                  "private_authenticated_delivery": 0.0,
                  "daily_readme_synchroniser": 0.0,
              },
          }

          for name, expected_stages in expected.items():
              assert name in repositories, f"missing pilot repository: {name}"
              record = repositories[name]
              completion = record["completion"]
              assert completion["state"] == "valid", (name, completion)
              actual_stages = {
                  stage["id"]: stage["percentage"]
                  for stage in completion["stages"]
              }
              assert actual_stages == expected_stages, (name, actual_stages)
              assert completion["overall_percentage"] is None, name

          assert repositories["armpitpete/unmurderous-objects"]["private"] is True
          assert repositories["armpitpete/vaelinya-canon"]["private"] is True
          assert repositories["armpitpete/project-status-engine"]["private"] is False

          public_text = "\n".join(
              path.read_text(encoding="utf-8")
              for path in Path("public").rglob("*")
              if path.is_file()
          )
          for private_name in (
              "armpitpete/unmurderous-objects",
              "armpitpete/vaelinya-canon",
          ):
              assert private_name not in public_text, private_name
              completion = repositories[private_name]["completion"]
              assert completion["authority"] not in public_text
              for stage in completion["stages"]:
                  assert stage["label"] not in public_text
                  if stage.get("evidence"):
                      assert stage["evidence"] not in public_text

          print(
              "Verified internal full-owner dataset for three pilots; "
              "public output contains no private pilot identity or completion detail."
          )
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload public Pages artifact only
        uses: actions/upload-pages-artifact@v3
        with:
          name: ${{ env.PAGES_ARTIFACT_NAME }}
          path: public

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy public surface to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: ${{ env.PAGES_ARTIFACT_NAME }}
