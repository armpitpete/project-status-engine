name: Diagnose stage transition

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Generate current views
        env:
          PROJECT_STATUS_TOKEN: ${{ secrets.PROJECT_STATUS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STATUS_OWNER: armpitpete
          STATUS_MAX_REPOS: "100"
          STATUS_MAX_ITEMS: "8"
          STATUS_PROJECT_LIMIT: "5"
          STATUS_ACTIVITY_WINDOW_DAYS: "30"
          STATUS_PROGRESS_PATH: .project/progress.json
          STATUS_OUT_DIR: public
          PRIVATE_STATUS_OUT_DIR: private-build
          INTERNAL_STATUS_OUT_DIR: internal-build
        run: python scripts/generate_status.py
      - name: Record anonymous selector counts and runtime stages
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path
          import sys

          sys.path.insert(0, "scripts")
          import completion_status
          import resolve_readme_pilots as resolver

          data_path = Path("internal-build/completion-status.json")
          selectors_path = Path("config/readme-sync-pilots.json")
          data = json.loads(data_path.read_text(encoding="utf-8"))
          selectors = resolver.load_selectors(selectors_path)
          candidates = resolver._load_candidates(data_path)

          counts = {}
          for selector in selectors:
              matches = [
                  candidate
                  for candidate in candidates
                  if candidate["private"] is selector["private"]
                  and candidate["project_type"] == selector["project_type"]
                  and candidate["authority"] == selector["authority"]
                  and candidate["stage_ids"] == selector["stage_ids"]
              ]
              counts[selector["id"]] = len(matches)

          records = {
              hashlib.sha256(item["full_name"].encode("utf-8")).hexdigest(): item
              for item in data["repositories"]
          }
          runtime_hash = hashlib.sha256(
              os.environ["GITHUB_REPOSITORY"].encode("utf-8")
          ).hexdigest()
          runtime = records.get(runtime_hash)
          local = completion_status.validate_progress(
              json.loads(Path(".project/progress.json").read_text(encoding="utf-8"))
          )
          result = {
              "event": os.environ.get("GITHUB_EVENT_NAME"),
              "match_counts": counts,
              "runtime_present": runtime is not None,
              "local": {
                  stage["id"]: stage["percentage"] for stage in local["stages"]
              },
              "runtime_live": None,
          }
          if runtime is not None:
              live = runtime["completion"]
              result["runtime_live"] = {
                  stage["id"]: stage["percentage"] for stage in live["stages"]
              }
          Path("stage-transition.json").write_text(
              json.dumps(result, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: stage-transition-counts
          path: stage-transition.json
          retention-days: 1
