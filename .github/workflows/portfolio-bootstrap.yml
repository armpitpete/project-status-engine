name: Portfolio completion bootstrap

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Audit, open/update bootstrap PRs, or merge the exact revalidated bootstrap set
        required: true
        type: choice
        options:
          - audit
          - apply
          - merge-approved
        default: audit
  schedule:
    - cron: "47 4 * * 0"
      timezone: "Europe/London"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/portfolio-bootstrap.yml"
      - "scripts/portfolio_bootstrap.py"
      - "scripts/portfolio_bootstrap_parts/**"
      - "tests/test_portfolio_bootstrap.py"
      - "docs/PORTFOLIO_BOOTSTRAP.md"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/portfolio-bootstrap.yml"
      - "scripts/portfolio_bootstrap.py"
      - "scripts/portfolio_bootstrap_parts/**"
      - "tests/test_portfolio_bootstrap.py"
      - "docs/PORTFOLIO_BOOTSTRAP.md"

permissions:
  contents: read
  statuses: write

concurrency:
  group: portfolio-completion-bootstrap
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run deterministic tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Prove bootstrap policy contains no repository identity
        run: |
          python - <<'PY'
          from pathlib import Path

          paths = [
              Path("scripts/portfolio_bootstrap.py"),
              *sorted(Path("scripts/portfolio_bootstrap_parts").glob("part*.inc")),
              Path("docs/PORTFOLIO_BOOTSTRAP.md"),
              Path(".github/workflows/portfolio-bootstrap.yml"),
          ]
          text = "\n".join(path.read_text(encoding="utf-8") for path in paths)
          assert ("github.com/" + "armpitpete/") not in text
          assert ("curious-world" + "-of-ellie-morcant") not in text
          print("Verified identity-free portfolio bootstrap implementation.")
          PY

  audit:
    needs: validate
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'audit'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Audit portfolio without writes
        env:
          README_SYNC_TOKEN: ${{ secrets.README_SYNC_TOKEN || secrets.PROJECT_STATUS_TOKEN }}
          STATUS_OWNER: armpitpete
        run: python scripts/portfolio_bootstrap.py

  bootstrap:
    needs: validate
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'apply')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Mark portfolio bootstrap running
        continue-on-error: true
        env:
          STATUS_TOKEN: ${{ github.token }}
          STATUS_STATE: pending
          STATUS_DESCRIPTION: Portfolio bootstrap is running
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          request = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/statuses/{os.environ['GITHUB_SHA']}",
              data=json.dumps(
                  {
                      "state": os.environ["STATUS_STATE"],
                      "context": "portfolio-bootstrap",
                      "description": os.environ["STATUS_DESCRIPTION"],
                  }
              ).encode("utf-8"),
              method="POST",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['STATUS_TOKEN']}",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
                  "User-Agent": "project-status-engine-bootstrap",
              },
          )
          with urllib.request.urlopen(request, timeout=30):
              pass
          PY

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Inventory and bootstrap the complete active portfolio
        env:
          README_SYNC_TOKEN: ${{ secrets.README_SYNC_TOKEN || secrets.PROJECT_STATUS_TOKEN }}
          STATUS_OWNER: armpitpete
          STATUS_REPORT_REPO: ${{ github.repository }}
          STATUS_REPORT_SHA: ${{ github.sha }}
        run: python scripts/portfolio_bootstrap.py --apply

      - name: Mark portfolio bootstrap successful
        if: success()
        continue-on-error: true
        env:
          STATUS_TOKEN: ${{ github.token }}
          STATUS_STATE: success
          STATUS_DESCRIPTION: Portfolio bootstrap completed successfully
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          request = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/statuses/{os.environ['GITHUB_SHA']}",
              data=json.dumps(
                  {
                      "state": os.environ["STATUS_STATE"],
                      "context": "portfolio-bootstrap",
                      "description": os.environ["STATUS_DESCRIPTION"],
                  }
              ).encode("utf-8"),
              method="POST",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['STATUS_TOKEN']}",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
                  "User-Agent": "project-status-engine-bootstrap",
              },
          )
          with urllib.request.urlopen(request, timeout=30):
              pass
          PY

      - name: Mark portfolio bootstrap failed
        if: failure()
        continue-on-error: true
        env:
          STATUS_TOKEN: ${{ github.token }}
          STATUS_STATE: failure
          STATUS_DESCRIPTION: Portfolio bootstrap failed closed
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          request = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/statuses/{os.environ['GITHUB_SHA']}",
              data=json.dumps(
                  {
                      "state": os.environ["STATUS_STATE"],
                      "context": "portfolio-bootstrap",
                      "description": os.environ["STATUS_DESCRIPTION"],
                  }
              ).encode("utf-8"),
              method="POST",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['STATUS_TOKEN']}",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
                  "User-Agent": "project-status-engine-bootstrap",
              },
          )
          with urllib.request.urlopen(request, timeout=30):
              pass
          PY

  merge-approved:
    needs: validate
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'merge-approved'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Revalidate and bulk-merge the exact bootstrap PR set
        env:
          README_SYNC_TOKEN: ${{ secrets.README_SYNC_TOKEN || secrets.PROJECT_STATUS_TOKEN }}
          STATUS_OWNER: armpitpete
        run: python scripts/portfolio_bootstrap.py --merge-approved
